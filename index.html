<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>davychxn.github.io</title>
  <meta name="description" content="Entry page for davychxn.github.io static sites.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --link: #0f4c81;
      --border: #dbe3ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 76, 129, 0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 0 0 16px 0;
      color: var(--muted);
      line-height: 1.5;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    a {
      color: var(--link);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    a:hover {
      text-decoration-thickness: 2px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Site Entry</h1>
    <p>Select a section:</p>
    <ul>
      <li><a href="./DECENTGUYS/">DECENT GUYS LLC</a></li>
      <li><a href="./CPP-BRAIN-docs/">CPP-BRAIN Documentation</a></li>
    </ul>
  </main>
</body>
</html>
